<div *ngIf="isOpen" class="login-popup-backdrop">
	<div class="login-popup modal-centered">
		<div class="login-icon mb-3">
			<!-- red cross icon -->
			<svg width="64" height="64" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
				<circle cx="12" cy="12" r="12" fill="#ffdddd"/>
				<path d="M8 8L16 16M16 8L8 16" stroke="#d32f2f" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
			</svg>
		</div>
		<h4 class="text-center">Acción no permitida</h4>
		<p class="text-center">Necesitas iniciar sesión para completar esta acción.</p>
		<div class="d-flex justify-content-center gap-2 mt-3">
			<button class="btn btn-outline-secondary" (click)="close()">Cerrar</button>
			<button class="btn btn-danger" (click)="goToLogin()">Ir a iniciar sesión</button>
		</div>
	</div>
</div>
