<div *ngIf="isOpen" class="login-popup-backdrop">
	<div class="login-popup">
		<h4>Necesitas iniciar sesión</h4>
		<p>Para continuar con esta acción es necesario iniciar sesión.</p>
		<div class="d-flex justify-content-end gap-2 mt-3">
			<button class="btn btn-secondary" (click)="close()">Cerrar</button>
			<button class="btn btn-primary" (click)="goToLogin()">Ir a iniciar sesión</button>
		</div>
	</div>
</div>
