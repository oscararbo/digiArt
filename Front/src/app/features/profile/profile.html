<div class="profile-container" [class.sidebar-collapsed]="!sidebarExpanded()">
    <!-- Back Button -->
    <app-back-button></app-back-button>

    <!-- Sidebar: User Profile Info -->
    <app-collapsible-sidebar 
        position="left"
        sidebarClass="profile-sidebar"
        [overlay]="false"
        [expandedSignal]="sidebarExpanded"
        [hasBottomActions]="true">
            <!-- Profile Picture -->
            <div class="profile-avatar">
                 <img *ngIf="userProfile()?.profile_image" 
                     [src]="userProfile()?.profile_image" 
                     [alt]="userProfile()?.username"
                     class="avatar-image">
                 <i *ngIf="!userProfile()?.profile_image" class="bi bi-person-circle"></i>
            </div>

            <!-- Username and Description -->
            <div class="profile-info">
                <h2 class="profile-username">{{ userProfile()?.username }}</h2>
                <p class="profile-description" *ngIf="!isEditingProfile()">
                    {{ userProfile()?.description || 'Sin descripción' }}
                </p>
            </div>

            <!-- Edit Form (only for current user) -->
            <div *ngIf="isCurrentUser() && isEditingProfile()" class="edit-form">
                <div *ngIf="profileMessage()" class="mb-3">
                    <div class="alert alert-danger" role="alert">{{ profileMessage() }}</div>
                </div>
                <div class="form-group">
                    <label>Nombre de usuario</label>
                    <input 
                        type="text" 
                        [(ngModel)]="editingUsername"
                        (blur)="checkUsername()"
                        (input)="checkUsername()"
                        class="form-control"
                        [class.is-invalid]="isUsernameTaken()">
                    <small *ngIf="isUsernameTaken()" class="text-danger">
                        Este nombre de usuario ya esta en uso
                    </small>
                </div>

                <div class="form-group">
                    <label>Descripción</label>
                    <textarea 
                        [(ngModel)]="editingDescription"
                        class="form-control"
                        rows="3"
                        placeholder="Cuéntanos sobre ti..."></textarea>
                </div>

                <div class="form-actions">
                    <button class="btn btn-save" 
                            (click)="saveProfileChanges()"
                            [disabled]="isUsernameTaken() || savingProfile() || editingUsername().trim().length === 0">
                        Guardar
                    </button>
                    <button class="btn btn-cancel" (click)="cancelEditingProfile()">
                        Cancelar
                    </button>
                </div>
            </div>
        
        <!-- Bottom Actions -->
        <button *ngIf="isCurrentUser() && !isEditingProfile()"
                bottom-actions
                class="btn-action btn-action-edit"
                (click)="startEditingProfile()"
                title="Editar perfil">
            <i class="bi bi-pencil"></i>
            <span>Editar perfil</span>
        </button>
        <button *ngIf="isCurrentUser()"
                bottom-actions
                class="btn-action btn-action-logout"
                (click)="logout()"
                title="Cerrar sesión">
            <i class="bi bi-box-arrow-right"></i>
            <span>Cerrar sesión</span>
        </button>
    </app-collapsible-sidebar>

    <!-- Main Content: Artworks -->
    <div class="profile-main">
        <!-- Favorites Section -->
        <section class="artworks-section">
            <div class="section-header">
                <div class="section-title-wrapper">
                    <h3 class="section-title" (click)="toggleFavorites()">
                        <i class="bi bi-heart"></i> Obras Favoritas
                    </h3>
                        <button class="btn-toggle-section" (click)="toggleFavorites()" 
                            [class.expanded]="isFavoritesExpanded()">
                        <i class="bi bi-chevron-down"></i>
                    </button>
                </div>
                
                <input 
                    *ngIf="isFavoritesExpanded()"
                    type="text" 
                    [(ngModel)]="favoritesSearchTerm"
                    placeholder="Buscar por título, autor o género..."
                    class="search-input">
            </div>

            <!-- Artworks Grid -->
            <div *ngIf="isFavoritesExpanded()" class="artworks-grid">
                <div *ngIf="filteredLikedArtworks.length > 0; else noFavorites">
                    <div *ngFor="let row of likedArtworksRows" class="artworks-row">
                        <div *ngFor="let obra of row" class="artwork-card-wrapper">
                            <app-art-card [data]="{ 
                                id: obra.id, 
                                title: obra.title, 
                                author: obra.authorUsername, 
                                imageUrl: obra.imageUrl,
                                likes: obra.likeCount
                            }"></app-art-card>
                            <app-artwork-stats-display 
                                [viewCount]="obra.viewCount"
                                [likeCount]="obra.likeCount">
                            </app-artwork-stats-display>
                        </div>
                    </div>
                </div>
                <ng-template #noFavorites>
                    <div class="no-artworks">
                        <i class="bi bi-heart"></i>
                        <p>No hay obras favoritas</p>
                    </div>
                </ng-template>
            </div>
        </section>

        <!-- Personal Artworks Section -->
        <section class="artworks-section">
            <div class="section-header">
                <div class="section-title-wrapper">
                    <h3 class="section-title" (click)="togglePersonal()">
                        <i class="bi bi-palette"></i> Obras Personales
                    </h3>
                        <button class="btn-toggle-section" (click)="togglePersonal()" 
                            [class.expanded]="isPersonalExpanded()">
                        <i class="bi bi-chevron-down"></i>
                    </button>
                </div>
                
                <input 
                    *ngIf="isPersonalExpanded()"
                    type="text" 
                    [(ngModel)]="personalSearchTerm"
                    placeholder="Buscar por título, autor o género..."
                    class="search-input">
            </div>

            <!-- Artworks Grid -->
            <div *ngIf="isPersonalExpanded()" class="artworks-grid">
                <div *ngIf="filteredPersonalArtworks.length > 0; else noPersonal">
                    <div *ngFor="let row of personalArtworksRows" class="artworks-row">
                        <div *ngFor="let obra of row" class="artwork-card-wrapper">
                            <app-art-card [data]="{ 
                                id: obra.id, 
                                title: obra.title, 
                                author: obra.authorUsername, 
                                imageUrl: obra.imageUrl,
                                likes: obra.likeCount
                            }"></app-art-card>
                            <app-artwork-stats-display 
                                [viewCount]="obra.viewCount"
                                [likeCount]="obra.likeCount">
                            </app-artwork-stats-display>
                        </div>
                    </div>
                </div>
                <ng-template #noPersonal>
                    <div class="no-artworks">
                        <i class="bi bi-palette"></i>
                        <p>No hay obras personales</p>
                    </div>
                </ng-template>
            </div>
        </section>
    </div>

    <!-- Upload Button -->
    <app-upload-button></app-upload-button>

    <!-- Upload Modal (Always Mounted) -->
    <app-upload-art-form></app-upload-art-form>
</div>
