<div class="home-container">
    <!-- Barra de búsqueda y filtros -->
    <div class="search-section" [class.collapsed]="searchSectionCollapsed">
        <!-- Botón Toggle -->
        <button class="btn-toggle-search" (click)="toggleSearchSection()" title="Mostrar/Ocultar filtros">
            <i class="bi" [class.bi-chevron-up]="!searchSectionCollapsed" [class.bi-chevron-down]="searchSectionCollapsed"></i>
        </button>

        <div class="search-container">
            <div class="search-bar">
                <i class="bi bi-search"></i>
                <input 
                    type="text" 
                    [(ngModel)]="busquedaTermino" 
                    placeholder="Buscar obras, artistas, géneros..."
                    (keyup.enter)="realizarBusqueda()"
                    class="search-input">
                <button class="btn-search" (click)="realizarBusqueda()" [disabled]="cargandoBusqueda">
                    <ng-container *ngIf="cargandoBusqueda">
                        <span class="spinner-border spinner-border-sm"></span>
                    </ng-container>
                    <ng-container *ngIf="!cargandoBusqueda">Buscar</ng-container>
                </button>
            </div>
            <div *ngIf="!searchSectionCollapsed" class="filters-section">
                <div class="filter-group">
                    <label class="filter-label">Filtrar por género:</label>
                    <div class="genre-tags">
                        <button 
                            class="tag-filter" 
                            [class.active]="generoSeleccionado === null"
                            (click)="limpiarBusqueda()">
                            Todos
                        </button>
                        <button *ngFor="let genero of todasGeneros()" 
                                class="tag-filter" 
                                [class.active]="generoSeleccionado === genero.id"
                                (click)="cambiarGeneroFiltro(genero.id)">
                            {{ genero.nombre }}
                        </button>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Ordenar por:</label>
                    <div class="order-buttons">
                        <button 
                            class="order-btn"
                            [class.active]="ordenarPor === 'reciente'"
                            (click)="cambiarOrden('reciente')">
                            <i class="bi bi-clock"></i> Recientes
                        </button>
                        <button 
                            class="order-btn"
                            [class.active]="ordenarPor === 'populares'"
                            (click)="cambiarOrden('populares')">
                            <i class="bi bi-heart"></i> Populares
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    <!-- Resultados de búsqueda -->
    <div *ngIf="mostrandoBusqueda" class="search-results-section">
            <div class="results-container">
                <div class="results-header">
                    <h2>Resultados de búsqueda</h2>
                    <button class="btn-clear-search" (click)="limpiarBusqueda()">
                        <i class="bi bi-x-lg"></i> Limpiar búsqueda
                    </button>
                </div>

                <div *ngIf="resultadosBusqueda.length > 0; else noResults" class="results-grid">
                    <div *ngFor="let obra of resultadosBusqueda" class="result-item">
                        <app-art-card 
                            [data]="{ 
                                id: obra.id, 
                                title: obra.titulo, 
                                author: obra.autor_username, 
                                imageUrl: obra.imageUrl 
                            }">
                        </app-art-card>
                        <div class="result-stats">
                            <span class="stat">
                                <i class="bi bi-eye"></i> {{ obra.vistas }}
                            </span>
                            <button 
                                class="stat like-btn"
                                (click)="toggleLike(obra)"
                                [class.liked]="obra.likes > 0">
                                <i class="bi bi-heart"></i> {{ obra.likes }}
                            </button>
                        </div>
                    </div>
                </div>
                <ng-template #noResults>
                    <div class="no-results">
                        <i class="bi bi-search"></i>
                        <p>No se encontraron obras</p>
                    </div>
                </ng-template>
            </div>
        </div>
    <div *ngIf="!mostrandoBusqueda" class="sections-container">
        <div *ngFor="let seccion of secciones()" class="section">
            <div class="section-header">
                <h2 class="section-title">{{ seccion.titulo }}</h2>
                <button class="btn-ver-mas" (click)="abrirModal(seccion)">
                    Ver más <i class="bi bi-chevron-right"></i>
                </button>
            </div>

            <!-- Filas deslizables con 10 cards -->
            <div class="artworks-scroll">
                <div *ngIf="seccion.obras && seccion.obras.length > 0; else noArtworks">
                    <div class="artworks-row">
                        <div *ngFor="let obra of seccion.obras" class="artwork-card-wrapper">
                            <app-art-card [data]="{ 
                                id: obra.id, 
                                title: obra.titulo, 
                                author: obra.autor_username, 
                                imageUrl: obra.imageUrl 
                            }"></app-art-card>
                        </div>
                    </div>
                </div>
                <ng-template #noArtworks>
                    <div class="no-artworks">No hay obras disponibles</div>
                </ng-template>
            </div>
        </div>
    </div>

        <!-- Modal para Ver más -->
        <div *ngIf="modalActiva && modalSeccion" class="modal-overlay" (click)="cerrarModal()">
            <div class="modal-content" (click)="$event.stopPropagation()">
                <div class="modal-header">
                    <h2 class="modal-title">{{ modalSeccion.titulo }}</h2>
                    <button class="btn-close-modal" (click)="cerrarModal()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>

                <!-- Grid de 3 columnas con 30 obras -->
                <div *ngIf="obrasPaginadas && obrasPaginadas.length > 0; else noModalArtworks" class="modal-grid">
                    <div *ngFor="let obra of obrasPaginadas" class="grid-item">
                        <app-art-card [data]="{ 
                            id: obra.id, 
                            title: obra.titulo, 
                            author: obra.autor_username, 
                            imageUrl: obra.imageUrl 
                        }"></app-art-card>
                    </div>
                </div>
                <ng-template #noModalArtworks>
                    <div class="no-artworks">No hay obras disponibles</div>
                </ng-template>
            </div>
        </div>

    <!-- Botón flotante de upload -->
    <app-upload-button></app-upload-button>

    <!-- Modal de upload (siempre cargado) -->
    <app-upload-art-form></app-upload-art-form>
</div>
