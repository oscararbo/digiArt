<div class="home-container">
    <!-- Search and filters -->
    <div class="search-section" [class.collapsed]="isSearchSectionCollapsed">
        <!-- Toggle button -->
        <button class="btn-toggle-search" (click)="toggleSearchSection()" title="Mostrar/Ocultar filtros">
            <i class="bi" [class.bi-chevron-up]="!isSearchSectionCollapsed" [class.bi-chevron-down]="isSearchSectionCollapsed"></i>
        </button>

        <div class="search-container">
            <div class="search-bar">
                <i class="bi bi-search"></i>
                <input 
                    type="text" 
                    [(ngModel)]="searchTerm" 
                    placeholder="Buscar obras, artistas, géneros..."
                    (keyup.enter)="runSearch()"
                    class="search-input">
                <button class="btn-search" (click)="runSearch()" [disabled]="isSearchLoading">
                    <ng-container *ngIf="isSearchLoading">
                        <span class="spinner-border spinner-border-sm"></span>
                    </ng-container>
                    <ng-container *ngIf="!isSearchLoading">Buscar</ng-container>
                </button>
                <button class="btn-profile" routerLink="/profile" title="Mi Perfil">
                    <i class="bi bi-person-circle"></i>
                    <span>Perfil</span>
                </button>
            </div>
            <div *ngIf="!isSearchSectionCollapsed" class="filters-section">
                <div class="filter-group">
                    <label class="filter-label">Filtrar por género:</label>
                    <div class="genre-tags">
                        <button 
                            class="tag-filter" 
                            [class.active]="selectedGenreId === null"
                            (click)="clearSearch()">
                            Todos
                        </button>
                        <button *ngFor="let genre of allGenres()" 
                                class="tag-filter" 
                                [class.active]="selectedGenreId === genre.id"
                                (click)="setGenreFilter(genre.id)">
                            {{ genre.name }}
                        </button>
                    </div>
                </div>

                <div class="filter-group">
                    <label class="filter-label">Ordenar por:</label>
                    <div class="order-buttons">
                        <button 
                            class="order-btn"
                            [class.active]="sortBy === 'recent'"
                            (click)="setSortBy('recent')">
                            <i class="bi bi-clock"></i> Recientes
                        </button>
                        <button 
                            class="order-btn"
                            [class.active]="sortBy === 'popular'"
                            (click)="setSortBy('popular')">
                            <i class="bi bi-heart"></i> Populares
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
    

    <!-- Search results -->
    <div *ngIf="isSearching" class="search-results-section">
            <div class="results-container">
                <div class="results-header">
                    <h2>Resultados de búsqueda</h2>
                    <button class="btn-clear-search" (click)="clearSearch()">
                        <i class="bi bi-x-lg"></i> Limpiar búsqueda
                    </button>
                </div>

                <div *ngIf="searchResults().length > 0; else noResults" class="results-grid">
                    <div *ngFor="let artwork of searchResults()" class="result-item">
                        <app-art-card 
                            [data]="{ 
                                id: artwork.id, 
                                title: artwork.title, 
                                author: artwork.authorUsername, 
                                imageUrl: artwork.imageUrl 
                            }">
                        </app-art-card>
                        <div class="result-stats">
                            <span class="stat">
                                <i class="bi bi-eye"></i> {{ artwork.viewCount }}
                            </span>
                            <button 
                                class="stat like-btn"
                                (click)="toggleLike(artwork)"
                                [class.liked]="artwork.likeCount > 0">
                                <i class="bi bi-heart"></i> {{ artwork.likeCount }}
                            </button>
                        </div>
                    </div>
                </div>
                <ng-template #noResults>
                    <div class="no-results">
                        <i class="bi bi-search"></i>
                        <p>No se encontraron obras</p>
                    </div>
                </ng-template>
            </div>
        </div>
    <div *ngIf="!isSearching" class="sections-container">
        <div *ngFor="let section of sections()" class="section">
            <div class="section-header">
                <h2 class="section-title">{{ section.title }}</h2>
                <button class="btn-ver-mas" (click)="openModal(section)">
                    Ver más <i class="bi bi-chevron-right"></i>
                </button>
            </div>

            <!-- Scrollable rows with 10 cards -->
            <div class="artworks-scroll">
                <div *ngIf="section.artworks && section.artworks.length > 0; else noArtworks">
                    <div class="artworks-row">
                        <div *ngFor="let artwork of section.artworks" class="artwork-card-wrapper">
                            <app-art-card [data]="{ 
                                id: artwork.id, 
                                title: artwork.title, 
                                author: artwork.authorUsername, 
                                imageUrl: artwork.imageUrl 
                            }"></app-art-card>
                        </div>
                    </div>
                </div>
                <ng-template #noArtworks>
                    <div class="no-artworks">No hay obras disponibles</div>
                </ng-template>
            </div>
        </div>
    </div>

        <!-- Modal for section details -->
        <div *ngIf="isModalOpen && modalSection" class="modal-overlay" (click)="closeModal()">
            <div class="modal-content" (click)="$event.stopPropagation()">
                <div class="modal-header">
                    <h2 class="modal-title">{{ modalSection.title }}</h2>
                    <button class="btn-close-modal" (click)="closeModal()">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>

                <!-- 3-column grid with 30 artworks -->
                <div *ngIf="pagedArtworks().length > 0; else noModalArtworks" class="modal-grid">
                    <div *ngFor="let artwork of pagedArtworks()" class="grid-item">
                        <app-art-card [data]="{ 
                            id: artwork.id, 
                            title: artwork.title, 
                            author: artwork.authorUsername, 
                            imageUrl: artwork.imageUrl 
                        }"></app-art-card>
                    </div>
                </div>
                <ng-template #noModalArtworks>
                    <div class="no-artworks">No hay obras disponibles</div>
                </ng-template>
            </div>
        </div>

    <!-- Upload button -->
    <app-upload-button></app-upload-button>

    <!-- Upload modal (always mounted) -->
    <app-upload-art-form></app-upload-art-form>
</div>
